<div align="center">
    <h3>User List</h3>
    <h3 style="color: green;">{{ form.successMessage }}</h3>
    <h3 style="color: red;">{{ form.errorMessage }}</h3>
    <form>

        <table>
            <tr>
                <th>First Name</th>
                <td><input type="text" name="firstName" [(ngModel)]="form.searchParam.firstName"
                        placeholder="First Name"></td>
                <td>
                    <button (click)="search()">Search</button>
                </td>
                <td>
                    <button (click)="reset()">reset</button>
                </td>
            </tr>
        </table>

        <table border="1px" width="100%">
            <tr style="background-color: skyblue;">
                <th>Select</th>
                <th>Id</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Role Name</th>
                <th>LoginId</th>
                <th>dob</th>
                <th>Action</th>
            </tr>

            <tr *ngFor="let user of form.list" align="center">
                <td><input type="checkbox" (click)="onClickCheckbox(user.id)"></td>
                <td>{{ user.id }}</td>
                <td>{{ user.firstName }}</td>
                <td>{{ user.lastName }}</td>
                <td>{{ user.roleName }}</td>
                <td>{{ user.loginId }}</td>
                <td>{{ user.dob | date: 'yyyy-MM-dd' }}</td>
                <td><a (click)="editUser('/user/' + user.id)">Edit</a></td>
            </tr>
        </table>
        <table width="100%">
            <tr>
                <td>
                    <button [disabled]="form.pageNo === 0" (click)="previous()">Previous</button>
                </td>
                <td>
                    <button (click)="delete()">Delete</button>
                </td>
                <td align="right">
                    <button [disabled]="form.list.length < 5" (click)="next()">Next</button>
                </td>
            </tr>
        </table>
    </form>

</div>
