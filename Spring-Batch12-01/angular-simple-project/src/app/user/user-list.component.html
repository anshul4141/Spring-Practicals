<div align="center">
    <h3>User List</h3>
    <form>

        <table>
            <tr>
                <th>First Name</th>
                <td><input type="text" name="firstName" [(ngModel)]="form.searchParam.firstName"
                        placeholder="First Name"></td>
                <td>
                    <button (click)="search()">Search</button>
                </td>
                <td>
                    <button (click)="reset()">reset</button>
                </td>
            </tr>
        </table>

        <table border="1px" width="100%">

            <tr style="background-color: skyblue;">
                <th>Id</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Role Name</th>
                <th>LoginId</th>
                <th>dob</th>
            </tr>

            <tr *ngFor="let user of form.list" align="center">
                <td>{{ user.id }}</td>
                <td>{{ user.firstName }}</td>
                <td>{{ user.lastName }}</td>
                <td>{{ user.roleName }}</td>
                <td>{{ user.loginId }}</td>
                <td>{{ user.dob | date: 'yyyy-MM-dd' }}</td>
            </tr>


        </table>

    </form>

</div>
