<table>
    <tr style="width: 100%;">
        <td>
            <div *ngIf="!isLogin()">

                <h3>Hii, Guest</h3>
                <a routerLink="/login">Login</a> |
                <a routerLink="/welcome">Welcome</a>

            </div>

            <div *ngIf="isLogin()">

                <h3>Hii, {{form.data.firstName}} ({{form.data.roleName}})</h3>
                <a routerLink="/user">Add User</a> |
                <a routerLink="/userList">User List</a> |
                <a (click)="logout()">
                    <font color="blue"><u>Logout</u></font>
                </a>

            </div>

        </td>

        <td style="width: 2%;">
            <div *ngIf="isLogin()">
                <img src="http://localhost:8080/User/profilePic/{{form.data.id}}" width="90" height="90">
            </div>
        </td>

    </tr>
</table>

<hr>
